<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>K&amp;E Nexus — Custom Software &amp; Digital Solutions</title>
    <meta
      name="description"
      content="K&E Nexus builds custom software, workflow automation, and web &amp; mobile applications for businesses of any size. Two engineers, one mission: making custom digital solutions accessible to every business."
    />
    <meta name="author" content="K&E Nexus" />
    <meta name="theme-color" content="#0b1122" />
    <link rel="canonical" href="https://kenexus.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="K&E Nexus" />
    <meta property="og:title" content="K&E Nexus — Custom Software &amp; Digital Solutions" />
    <meta
      property="og:description"
      content="Global reach, strategic execution. K&E Nexus designs and builds custom digital solutions that fix real operational bottlenecks."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://kenexus.com/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="K&E Nexus — Custom Software &amp; Digital Solutions" />
    <meta
      name="twitter:description"
      content="Global reach, strategic execution. K&E Nexus designs and builds custom digital solutions that fix real operational bottlenecks."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      (function () {
        var stored = localStorage.getItem('ke-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = stored ? stored === 'dark' : prefersDark;
        document.documentElement.classList.toggle('dark', isDark);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
